services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - ./backend/db/migrations:/migrations
      - ./backend/db/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    tmpfs:
      - /var/lib/postgresql/data
    labels:
      superbear.e2e: "true"
      superbear.worktree: "${WORKTREE_NAME:-main}"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data
    labels:
      superbear.e2e: "true"
      superbear.worktree: "${WORKTREE_NAME:-main}"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "${E2E_PORT_API:-3300}:8080"
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_test?sslmode=disable
      PORT: "8080"
      JWT_SECRET: test-secret
      ALLOWED_ORIGINS: "*"
      APP_ENV: test
      REDIS_ADDR: redis:6379
      KIS_APP_KEY: ${KIS_APP_KEY:-}
      KIS_APP_SECRET: ${KIS_APP_SECRET:-}
    labels:
      superbear.e2e: "true"
      superbear.worktree: "${WORKTREE_NAME:-main}"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "${E2E_PORT_WORKER:-3400}:8081"
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_test?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_ENV: test
    labels:
      superbear.e2e: "true"
      superbear.worktree: "${WORKTREE_NAME:-main}"

  root-app:
    build:
      context: .
      dockerfile: .claude/skills/e2e/templates/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${E2E_PORT_API:-3300}
    depends_on:
      api: { condition: service_started }
    ports:
      - "${E2E_PORT_ROOT:-3100}:3000"
    environment:
      API_URL: http://api:8080
    labels:
      superbear.e2e: "true"
      superbear.worktree: "${WORKTREE_NAME:-main}"
